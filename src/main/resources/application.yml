spring:
  application:
    name: resume-shaper-backend

  # ── Database ───────────────────────────────────────────────
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/resumeshaper}
    username: ${DB_USERNAME:resumeshaper}
    password: ${DB_PASSWORD:resumeshaper}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate        # Flyway owns schema; Hibernate only validates
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  # ── Flyway ─────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── Redis ──────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

  # ── File Upload ────────────────────────────────────────────
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 12MB

  # ── OAuth2 ─────────────────────────────────────────────────
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: email, profile
            redirect-uri: "{baseUrl}/api/auth/oauth2/callback/{registrationId}"
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            scope: user:email
            redirect-uri: "{baseUrl}/api/auth/oauth2/callback/{registrationId}"

# ── Server ─────────────────────────────────────────────────
server:
  port: ${PORT:8080}
  compression:
    enabled: true
    mime-types: application/json,application/octet-stream
  error:
    include-message: never       # don't leak stack traces in prod

# ── Actuator ───────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# ── App-specific ───────────────────────────────────────────
app:
  # JWT
  jwt:
    secret: ${JWT_SECRET}         # min 64 chars, base64-encoded
    expiry-ms: 86400000           # 24 h
    refresh-expiry-ms: 604800000  # 7 days

  # Guest sessions (Redis TTL)
  guest:
    session-ttl-hours: 24

  # Gemini
  gemini:
    api-key: ${GEMINI_API_KEY}
    model: gemini-2.5-flash
    base-url: https://generativelanguage.googleapis.com/v1beta
    timeout-seconds: 60
    max-output-tokens: 8192

  # AWS S3
  storage:
    s3:
      bucket: ${S3_BUCKET}
      region: ${AWS_REGION:ap-south-1}
      presigned-url-expiry-minutes: 60

  # CORS
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

  # OAuth2 redirect after login
  oauth2:
    redirect-uri: ${OAUTH2_REDIRECT_URI:http://localhost:3000/auth/callback}

  # ATS scoring weights
  ats:
    keyword-match-weight: 0.5
    section-completeness-weight: 0.3
    format-quality-weight: 0.2
